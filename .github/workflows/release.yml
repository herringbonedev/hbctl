name: CLI Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version, example: v0.4.0-alpha.1"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build
        run: |
          VERSION="${{ inputs.version }}"
          mkdir -p dist
          BINARY_NAME=hbctl
          OUTPUT=${BINARY_NAME}_${VERSION}_${{ matrix.goos }}_${{ matrix.goarch }}

          if [ "${{ matrix.goos }}" = "windows" ]; then
            OUTPUT="${OUTPUT}.exe"
          fi

          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 \
            go build -ldflags="-s -w -X main.version=${VERSION}" \
            -o dist/${OUTPUT}

      - uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: cli-release

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.HERRINGBONE_ACTIONS_BOT }}

      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifacts
        run: |
          mkdir -p final
          find dist -type f -exec mv {} final/ \;
          cd final
          sha256sum * > checksums.txt

      - name: Validate version
        run: |
          VERSION="${{ inputs.version }}"

          if ! echo "$VERSION" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$'; then
            echo "Invalid version: $VERSION"
            echo "Use something like v0.4.0 or v0.4.0-alpha.1"
            exit 1
          fi

      - name: Create and push tag
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git config user.name "herringbone-actions-bot"
          git config user.email "herringbone-actions-bot@users.noreply.github.com"

          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "Tag $VERSION already exists locally."
          else
            git tag "$VERSION"
          fi

          git push origin "$VERSION"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: ${{ inputs.version }}
          draft: false
          prerelease: ${{ contains(inputs.version, '-alpha') || contains(inputs.version, '-beta') || contains(inputs.version, '-rc') }}
          files: final/*
        env:
          GITHUB_TOKEN: ${{ secrets.HERRINGBONE_ACTIONS_BOT }}